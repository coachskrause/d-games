<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Damon Games Calendar</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>

  <!-- Axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }

    #calendar {
      max-width: 900px;
      margin: 0 auto;
    }

    .games-link {
      color: #8B0000;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <h2>Damon Games</h2>
  <div id="calendar"></div>

  <script>
    const apiKey = 'AIzaSyAlJNi586IEGgy5pzHmvjZXcbrSp511Yns';
    const calendarId = '3qev7d2fup8uis00v4cck9v7r2kb4buj@import.calendar.google.com';

    document.addEventListener('DOMContentLoaded', async function () {
      const calendarEl = document.getElementById('calendar');

      try {
        const response = await axios.get(
          `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events`,
          {
            params: {
              key: apiKey,
              singleEvents: true,
              orderBy: 'startTime',
              maxResults: 2500
            }
          }
        );

        const events = response.data.items
          .filter(event =>
            event.start &&
            event.summary &&
            event.summary.toLowerCase().includes(keyword.toLowerCase())
          )
          .map(event => ({
            title: event.summary,
            start: event.start.dateTime || event.start.date,
            end: event.end?.dateTime || event.end?.date,
            url: event.htmlLink
          }));

        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          events: events,
          eventClick: function(info) {
            info.jsEvent.preventDefault();
            if (info.event.url) {
              window.open(info.event.url, '_blank');
            }
          },
          eventContent: function(arg) {
            const a = document.createElement('a');
            a.href = arg.event.url;
            a.target = '_blank';
            a.textContent = arg.event.title;
            a.className = 'games-link';
            return { domNodes: [a] };
          }
        });

        calendar.render();

      } catch (err) {
        console.error('Error loading calendar:', err);
      }
    });
  </script>
</body>
</html>
