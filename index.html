<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Damon Games Schedule</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 1rem;
}

h2 {
  text-align: center;
  color: #d32f2f;
}

button {
  display: block;
  margin: 0 auto 1rem auto;
  padding: 0.6rem 1rem;
  border: none;
  background: #d32f2f;
  color: white;
  border-radius: 5px;
  font-size: 1rem;
}

#events {
  max-width: 700px;
  margin: 0 auto;
}

.event {
  background: white;
  border-radius: 10px;
  padding: 1rem;
  margin-bottom: 1rem;
  border-left: 6px solid;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.title {
  font-weight: bold;
}

.meta {
  font-size: 0.9rem;
  margin-top: 0.3rem;
}
</style>
</head>

<body>

<h2>Damon Games Schedule</h2>
<button onclick="window.print()">Print</button>

<div id="events">Loading...</div>

<script>
const API_URL = "https://d-games.veinoffeeling.workers.dev";

const COLORS = {
  team1: "#F6BF26",
  team2: "#0026ff",
  default: "#616161"
};

async function load() {
  const res = await fetch(API_URL);
  const events = await res.json();

  render(events);
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleString("en-US", {
    timeZone: "America/New_York",
    dateStyle: "medium",
    timeStyle: "short"
  });
}

function mapsLink(location) {
  const q = encodeURIComponent(location);
  return `https://www.google.com/maps/search/?api=1&query=${q}`;
}

function render(events) {
  if (!events.length) {
    document.getElementById("events").innerText = "No events found";
    return;
  }

  const html = events.map(e => {
    const color = COLORS[e.source] || COLORS.default;

    return `
      <div class="event" style="border-left-color:${color}">
        <div class="title">${e.title}</div>
        <div class="meta">${formatDate(e.startUTC)}</div>
        ${
          e.location
          ? `<div class="meta">
               <a href="${mapsLink(e.location)}" target="_blank">
                 ${e.location}
               </a>
             </div>`
          : ""
        }
      </div>
    `;
  }).join("");

  document.getElementById("events").innerHTML = html;
}

load();
</script>

</body>
</html>
