<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Damon Games</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 1rem;
      max-width: 700px;
      margin: auto;
      background: #f5f5f5;
    }

    h2 {
      color: #d32f2f;
      text-align: center;
    }

    .event-card {
      background: #fff;
      border: 1px solid #ddd;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .event-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .event-meta {
      margin: 0.25rem 0;
      color: #333;
    }

    a {
      color: #1565c0;
      text-decoration: underline;
      word-break: break-word;
    }

    #download-btn {
      display: block;
      margin: 1rem auto;
      padding: 0.6rem 1rem;
      font-size: 1rem;
      background: #d32f2f;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #download-btn:hover {
      background: #b71c1c;
    }
  </style>
</head>

<body>
  <h2>Damon Games</h2>

  <button id="download-btn">Print</button>

  <div id="events">Loading events...</div>

  <script>
    const WORKER_URL = 'https://d-games.veinoffeeling.workers.dev/games';

    async function fetchEvents() {
      try {
        const res = await fetch(WORKER_URL);
        const data = await res.json();

        renderEvents(data);
      } catch (err) {
        console.error(err);
        document.getElementById('events').innerHTML = 'Failed to load events.';
      }
    }

    function renderEvents(events) {
      const container = document.getElementById('events');

      if (!events || !events.length) {
        container.innerHTML = 'No events found.';
        return;
      }

      // Filter out invalid events (important)
      const validEvents = events
        .filter(e => e.start)
        .sort((a, b) => new Date(a.start) - new Date(b.start));

      const html = validEvents.map(e => {
        const start = new Date(e.start).toLocaleString();

        const location = e.location
          ? `<div class="event-meta">
              📍 <a href="https://www.google.com/maps/search/?q=${encodeURIComponent(e.location)}" target="_blank">
                ${e.location}
              </a>
            </div>`
          : '';

        const description = e.description
          ? `<div class="event-meta">${e.description}</div>`
          : '';

        const links = `
          ${e.url ? `<div><a href="${e.url}" target="_blank">View Event</a></div>` : ''}
          ${e.mapsUrl ? `<div><a href="${e.mapsUrl}" target="_blank">Open in Maps</a></div>` : ''}
        `;

        return `
          <div class="event-card">
            <div class="event-title">${e.title}</div>
            <div class="event-meta"><strong>${start}</strong></div>
            ${location}
            ${description}
            ${links}
          </div>
        `;
      }).join('');

      container.innerHTML = html;
    }

    // Print button
    document.getElementById('download-btn').addEventListener('click', () => {
      const printContents = document.getElementById('events').innerHTML;

      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <html>
          <head>
            <title>Damon Games</title>
            <style>
              body {
                font-family: sans-serif;
                padding: 1rem;
                max-width: 700px;
                margin: auto;
              }
              .event-card {
                border: 1px solid #ccc;
                padding: 1rem;
                border-radius: 8px;
                margin-bottom: 1rem;
              }
              a {
                color: #0000ee;
                word-break: break-word;
              }
            </style>
          </head>
          <body>
            <h2>Damon Games</h2>
            ${printContents}
          </body>
        </html>
      `);

      printWindow.document.close();
      printWindow.focus();
      printWindow.print();
    });

    fetchEvents();
  </script>
</body>
</html>
